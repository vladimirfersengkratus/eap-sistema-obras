            }, [isOpen, item]);

            if (!isOpen || !item) return null;

            const handleCalculateAndSave = () => {
                const getVal = (v) => (v === '' || isNaN(v)) ? 1 : parseFloat(v);
                const c = comp !== '' ? parseFloat(comp) : null;
                const l = larg !== '' ? parseFloat(larg) : null;
                const a = alt !== '' ? parseFloat(alt) : null;
                const f = fator !== '' ? parseFloat(fator) : 1;
                
                const total = f * (c || 1) * (l || 1) * (a || 1);
                
                let dims = [];
                if (c) dims.push(`${c}m (C)`);
                if (l) dims.push(`${l}m (L)`);
                if (a) dims.push(`${a}m (H)`);
                
                let memoryString = `Cálculo: ${f} repetições`;
                if (dims.length > 0) memoryString += ` × ${dims.join(' × ')}`;
                memoryString += `\nResultado: ${total.toFixed(2)} ${item.unit}`;
                if (obs) memoryString += `\nObs: ${obs}`;

                onSave(item.id, memoryString, parseFloat(total.toFixed(2)));
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Repetições/Fator</label>

                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Comprimento (m)</label>
                                    <input type="number" step="0.01" value={comp} onChange={e=>setComp(e.target.value)} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-center" placeholder="1.00" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Largura (m)</label>
                                    <input type="number" step="0.01" value={larg} onChange={e=>setLarg(e.target.value)} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-center" placeholder="1.00" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Altura (m)</label>
                                    <input type="number" step="0.01" value={alt} onChange={e=>setAlt(e.target.value)} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-center" placeholder="1.00" />

                    if (group.items.length > 0) {
                        csv += `"${group.code} - ${group.name}",,,,,,,\n`;
                        group.items.forEach(item => {
                            const total = (item.quantity || 0) * (item.unitPrice || 0);
                            const perc = projectTotal > 0 ? ((total / projectTotal) * 100).toFixed(2) + '%' : '0%';
                            csv += `,"${item.code}","${item.description}","${item.unit}",${item.quantity},${item.unitPrice},${total},"${perc}"\n`;
                        });
                        const groupTotal = group.items.reduce((acc, item) => acc + ((item.quantity || 0) * (item.unitPrice || 0)), 0);
                        csv += `Subtotal ${group.code},,,,,,${groupTotal},\n`;
                    }
                });
                csv += `TOTAL GERAL,,,,,,${projectTotal},\n`;
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });

                                    const groupPerc = projectTotal > 0 ? ((groupTotal / projectTotal) * 100).toFixed(2) : 0;
                                    return (

        const MainWorkspace = ({ user, company, project, onGoToObras, onLogout }) => {

            const [eapData, setEapData] = useState(INITIAL_EAP_STRUCTURE);
            const [activeGroupId, setActiveGroupId] = useState(1);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            
            const [isServiceModalOpen, setServiceModalOpen] = useState(false);
            const [isCalcModalOpen, setCalcModalOpen] = useState(false);
            const [selectedCalcItem, setSelectedCalcItem] = useState(null);

            useEffect(() => {
                if (!project || !user) return;
                setLoading(true);
                const docRef = db.doc(`${getUserPath(user.uid)}/orcamentos/${project.id}`);
                
                docRef.get().then(snap => {
                    if (snap.exists) {
                        setEapData(snap.data().eap);
                        if (snap.data().updatedAt) setLastSaved(snap.data().updatedAt.toDate());
                    } else {
                        setEapData(INITIAL_EAP_STRUCTURE);
                        setLastSaved(null);
                    }
                    setLoading(false);
                }).catch(err => {
                    console.error("Erro ao carregar orçamento", err);
                    setLoading(false);

                setSaving(true);
                try {
                    const docRef = db.doc(`${getUserPath(user.uid)}/orcamentos/${project.id}`);

                        eap: data,
                        updatedAt: new Date(),
                        version: '1.0.0',
                        modifiedBy: user.uid
                    });
                    setLastSaved(new Date());

                    console.error("Erro ao salvar no Firestore", e);
                    alert("Erro ao salvar alterações na nuvem.");
                }
                setSaving(false);
            };

            const handleAddService = (serviceFromCatalog) => {
                const newData = eapData.map(group => {
                    if (group.id === activeGroupId) {
                        return {
                            ...group,
                            items: [...group.items, { id: Date.now().toString(), code: serviceFromCatalog.code, description: serviceFromCatalog.name, unit: serviceFromCatalog.unit, quantity: 0, unitPrice: 0, memory: '', status: 'pending' }]
                        };
                    }
                    return group;
                });
                setEapData(newData);
                setServiceModalOpen(false);
            };

            const handleDeleteItem = (groupId, itemId) => {
                const newData = eapData.map(group => {
                    if (group.id === groupId) return { ...group, items: group.items.filter(i => i.id !== itemId) };
                    return group;
                });
                setEapData(newData);
            };

            const handleUpdateSubItem = (groupId, itemId, field, value) => {
                const newData = eapData.map(group => {
                    if (group.id === groupId) {
                        return { ...group, items: group.items.map(item => item.id === itemId ? { ...item, [field]: value } : item) };
                    }
                    return group;
                });
                setEapData(newData);
            };

            const handleSaveMemory = (itemId, text, calculatedQuantity) => {
                const newData = eapData.map(group => {
                    if (group.id === activeGroupId) {
                        return { 
                            ...group, 
                            items: group.items.map(item => 
                                item.id === itemId 
                                    ? { ...item, memory: text, quantity: calculatedQuantity !== undefined ? calculatedQuantity : item.quantity } 
                                    : item
                            ) 
                        };
                    }
                    return group;
                });
                setEapData(newData);
                setCalcModalOpen(false);
                setSelectedCalcItem(null);
            };

            const activeGroup = useMemo(() => eapData.find(g => g.id === activeGroupId) || eapData[0], [eapData, activeGroupId]);
            const projectTotal = useMemo(() => eapData.reduce((acc, group) => acc + group.items.reduce((gAcc, item) => gAcc + (parseFloat(item.quantity||0) * parseFloat(item.unitPrice||0)), 0), 0), [eapData]);
            const groupTotal = useMemo(() => activeGroup.items.reduce((acc, item) => acc + (parseFloat(item.quantity||0) * parseFloat(item.unitPrice||0)), 0), [activeGroup]);

            if (loading) {
                return <div className="flex items-center justify-center h-screen bg-gray-100 text-gray-600"><Icon name="refreshcw" className="animate-spin mr-2" /> Carregando Módulos...</div>;
            }

            return (
                <div className="flex flex-col h-screen bg-gray-100 font-sans overflow-hidden">
                    <TopNavBar 
                        user={user} company={company} project={project} 
                        activeModule={activeModule} setActiveModule={setActiveModule} 
                        onGoToObras={onGoToObras} onLogout={onLogout} 
                    />

                    {activeModule === 'orcamento' && (
                        <div className="flex flex-1 overflow-hidden">
                            <ServiceSelectorModal isOpen={isServiceModalOpen} onClose={() => setServiceModalOpen(false)} services={getCatalogForGroup(activeGroupId)} onSelect={handleAddService} />
                            <CalculationFormModal isOpen={isCalcModalOpen} onClose={() => setCalcModalOpen(false)} item={selectedCalcItem} onSave={handleSaveMemory} />

                            {/* SIDEBAR EAP */}
                            <div className={`${sidebarOpen ? 'w-80' : 'w-0'} bg-gray-900 text-white flex flex-col transition-all duration-300 shadow-xl overflow-hidden no-print z-0`}>
                                <div className="flex-1 overflow-y-auto custom-scrollbar">
                                    <div className="px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider bg-gray-950 sticky top-0 z-10">Estrutura Analítica (EAP)</div>
                                    {eapData.map(item => (
                                        <SidebarItem key={item.id} item={item} isActive={activeGroupId === item.id} onClick={() => setActiveGroupId(item.id)} />
                                    ))}
                                </div>
                            </div>

                            {/* MAIN CONTENT - TABELA */}
                            <div className="flex-1 flex flex-col min-w-0">
                                <header className="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 shadow-sm no-print">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600"><Icon name="menu" size={20} /></button>
                                        <div className="border-l border-gray-300 pl-4">
                                            <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                                <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-sm font-mono">{activeGroup.code}</span>
                                                {activeGroup.name}
                                            </h2>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-right mr-4 hidden md:block">
                                            <span className="block text-xs text-gray-500">Total do Projeto</span>
                                            <span className="block text-lg font-bold text-gray-900">{formatCurrency(projectTotal)}</span>
                                        </div>
                                        <button onClick={() => saveProject()} disabled={saving} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-white transition-colors shadow-sm ${saving ? 'bg-blue-400 cursor-wait' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                            {saving ? <Icon name="refreshcw" className="animate-spin" size={16} /> : <Icon name="save" size={16} />} {saving ? 'Salvando...' : 'Salvar Alterações'}
                                        </button>
                                    </div>
                                </header>

                                <main className="flex-1 overflow-y-auto p-6 bg-slate-50 custom-scrollbar">
                                    <div className="mb-6 flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-200 no-print">
                                        <div><p className="text-sm text-gray-500">Subtotal do Grupo</p><p className="text-2xl font-bold text-gray-800">{formatCurrency(groupTotal)}</p></div>
                                        <div><button onClick={() => setServiceModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white border border-green-600 rounded-lg hover:bg-green-700 shadow-sm text-sm font-medium"><Icon name="plus" size={18} /> Selecionar Serviço</button></div>
                                    </div>

                                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-gray-50 text-gray-700 font-semibold border-b border-gray-200 uppercase text-xs">
                                                    <tr>
                                                        <th className="px-4 py-3 w-20">Código</th>
                                                        <th className="px-4 py-3">Descrição do Serviço</th>
                                                        <th className="px-4 py-3 w-20">Unidade</th>
                                                        <th className="px-4 py-3 w-28 text-center">Qtd.</th>
                                                        <th className="px-4 py-3 w-32 text-center">Custo Unit.</th>
                                                        <th className="px-4 py-3 w-32 text-right">Total</th>
                                                        <th className="px-4 py-3 w-20 text-center">% Total</th>
                                                        <th className="px-4 py-3 w-28 text-center no-print">Memória</th>
                                                        <th className="px-4 py-3 w-20 text-center">Status</th>
                                                        <th className="px-4 py-3 w-16 text-center no-print">Ações</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {activeGroup.items.length === 0 ? (
                                                        <tr><td colSpan="10" className="px-4 py-12 text-center text-gray-400"><Icon name="filetext" className="mx-auto mb-2 opacity-50" size={32} />Nenhum serviço lançado.<br/>Clique em "Selecionar Serviço".</td></tr>
                                                    ) : (
                                                        activeGroup.items.map(item => {
                                                            const itemTotal = (item.quantity||0) * (item.unitPrice||0);
                                                            const itemPerc = projectTotal > 0 ? ((itemTotal / projectTotal) * 100).toFixed(2) : 0;
                                                            return (
                                                                <React.Fragment key={item.id}>
                                                                    <tr className="hover:bg-blue-50 transition-colors group">
                                                                        <td className="px-4 py-3 font-mono text-gray-500 text-xs">{item.code}</td>
                                                                        <td className="px-4 py-3 font-medium text-gray-700">{item.description}</td>
                                                                        <td className="px-4 py-3 text-gray-600">{item.unit}</td>
                                                                        <td className="px-2 py-3">
                                                                            <input type="number" step="0.01" value={item.quantity} onChange={(e) => handleUpdateSubItem(activeGroupId, item.id, 'quantity', e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-500 text-right font-bold text-gray-800 hover:bg-white transition-colors" placeholder="0.00" />
                                                                        </td>
                                                                        <td className="px-2 py-3">
                                                                            <div className="relative">
                                                                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">R$</span>
                                                                                <input type="number" step="0.01" value={item.unitPrice} onChange={(e) => handleUpdateSubItem(activeGroupId, item.id, 'unitPrice', e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded pl-7 pr-2 py-1.5 focus:ring-2 focus:ring-blue-500 text-right text-gray-700 hover:bg-white transition-colors" placeholder="0.00" />
                                                                            </div>
                                                                        </td>
                                                                        <td className="px-4 py-3 text-right font-bold text-blue-900">{formatCurrency(itemTotal)}</td>
                                                                        <td className="px-4 py-3 text-center text-xs text-gray-500">{itemPerc}%</td>
                                                                        <td className="px-4 py-3 text-center no-print">
                                                                            <button onClick={() => {setSelectedCalcItem(item); setCalcModalOpen(true);}} className={`flex items-center justify-center gap-1 w-full px-2 py-1.5 rounded border transition-all ${item.memory ? 'bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}><Icon name="calculator" size={14} /><span className="text-xs font-semibold">{item.memory ? 'Ver/Editar' : 'Calcular'}</span></button>
                                                                        </td>
                                                                        <td className="px-4 py-3 text-center">
                                                                            <button onClick={() => handleUpdateSubItem(activeGroupId, item.id, 'status', item.status === 'approved' ? 'pending' : 'approved')} className={`flex items-center justify-center w-full gap-1 px-2 py-1.5 rounded text-xs font-bold uppercase transition-colors ${item.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{item.status === 'approved' ? <Icon name="checkcircle" size={12}/> : <Icon name="lock" size={12}/>}{item.status === 'approved' ? 'OK' : 'Rev'}</button>
                                                                        </td>
                                                                        <td className="px-4 py-3 text-center no-print"><button onClick={() => handleDeleteItem(activeGroupId, item.id)} className="text-gray-400 hover:text-red-600 p-1.5 rounded hover:bg-red-50 transition-colors"><Icon name="trash2" size={16} /></button></td>
                                                                    </tr>
                                                                    {item.memory && (
                                                                        <tr className="bg-yellow-50/50 border-b border-gray-100"><td colSpan="2"></td><td colSpan="8" className="px-4 pb-3 pt-1"><div className="flex gap-2 items-start text-xs text-gray-500 whitespace-pre-wrap"><Icon name="calculator" size={12} className="mt-0.5 text-yellow-600"/><span>{item.memory}</span></div></td></tr>
                                                                    )}
                                                                </React.Fragment>
                                                            );
                                                        })
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="bg-gray-50 px-6 py-3 border-t border-gray-200 flex justify-between items-center text-xs text-gray-500 no-print">
                                            <span>{activeGroup.items.length} serviços selecionados neste grupo</span>
                                            {lastSaved && <span className="flex items-center gap-1 text-green-600 font-medium"><Icon name="checkcircle" size={14}/> Alterações salvas na nuvem às {lastSaved.toLocaleTimeString()}</span>}
                                        </div>
                                    </div>
                                </main>
                            </div>
                        </div>
                    )}

                    {activeModule === 'relatorios' && (
                        <div className="flex-1 overflow-y-auto bg-white custom-scrollbar">
                            <RelatorioOrcamentoCompleto eapData={eapData} projectTotal={projectTotal} project={project} company={company} />
                        </div>
                    )}
                </div>
            );
        };

        // --- ROOT APPLICATION CONTROLLER ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [projects, setProjects] = useState([]);
            const [selectedProject, setSelectedProject] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    const isCustomProject = firebaseConfig.projectId === "eap-sistema-obras";
                    if (!isCustomProject && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await auth.signInWithCustomToken(__initial_auth_token); } catch(e) { console.warn("Erro no Token:", e.message); }
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) { setCompanies([]); setSelectedCompany(null); return; }
                const unsubscribe = db.collection(`${getUserPath(user.uid)}/empresas`).onSnapshot(snap => {
                    setCompanies(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!user || !selectedCompany) { setProjects([]); setSelectedProject(null); return; }
                const unsubscribe = db.collection(`${getUserPath(user.uid)}/obras`).onSnapshot(snap => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(o => o.empresaId === selectedCompany.id));
                });
                return () => unsubscribe();
            }, [user, selectedCompany]);

            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.warn("Popup bloqueado. Usando modo anônimo.", error);
                    await auth.signInAnonymously();
                }
            };

            const handleLogout = () => {
                auth.signOut();
                setSelectedCompany(null);
                setSelectedProject(null);
            };

            const handleCreateCompany = async (comp) => {
                try { await db.collection(`${getUserPath(user.uid)}/empresas`).add({ ...comp, createdAt: new Date() }); } catch(e) {}
            };

            const handleCreateProject = async (proj) => {
                try { await db.collection(`${getUserPath(user.uid)}/obras`).add({ ...proj, empresaId: selectedCompany.id, createdAt: new Date() }); } catch(e) {}
            };

            if (loadingAuth) return <div className="flex items-center justify-center h-screen bg-gray-50"><Icon name="refreshcw" className="animate-spin text-blue-600" size={32} /></div>;
            if (!user) return <LoginScreen onLogin={handleLogin} />;
            if (!selectedCompany) return <CompanyScreen companies={companies} onSelect={setSelectedCompany} onCreate={handleCreateCompany} user={user} onLogout={handleLogout} />;
            if (!selectedProject) return <ProjectScreen projects={projects} company={selectedCompany} onSelect={setSelectedProject} onCreate={handleCreateProject} onBack={() => setSelectedCompany(null)} user={user} onLogout={handleLogout} />;
            
            return <MainWorkspace user={user} company={selectedCompany} project={selectedProject} onGoToObras={() => setSelectedProject(null)} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
