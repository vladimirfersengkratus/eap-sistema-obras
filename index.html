                                ))}

                                    <Icon name="plus" size={32} className="text-gray-400 mb-2" />
                                    <h3 className="font-medium text-gray-600">Cadastrar Nova Empresa</h3>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-200 max-w-lg mx-auto">
                                <h2 className="text-xl font-bold mb-6">Nova Empresa</h2>
                                <form onSubmit={(e) => { e.preventDefault(); onCreate({ nome, cnpj }); setShowForm(false); }}>
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nome Fantasia / Razão Social</label>
                                        <input required type="text" value={nome} onChange={e=>setNome(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">CNPJ</label>
                                        <input required type="text" value={cnpj} onChange={e=>setCnpj(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="flex gap-3 justify-end">
                                        <button type="button" onClick={() => setShowForm(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancelar</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Cadastrar</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProjectScreen = ({ projects, company, onSelect, onCreate, onBack, user, onLogout }) => {
            const [showForm, setShowForm] = useState(false);
            const [nome, setNome] = useState('');
            const [endereco, setEndereco] = useState('');
            const [tipo, setTipo] = useState('Residencial');

            return (
                <div className="min-h-screen bg-slate-50 p-8">
                    <div className="max-w-5xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <button onClick={onBack} className="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-sm font-medium mb-2">
                                    <Icon name="arrowleft" size={16} /> Voltar para Empresas
                                </button>
                                <h1 className="text-3xl font-bold text-gray-800">Empreendimentos</h1>
                                <p className="text-gray-500">Empresa: {company.nome}</p>
                            </div>
                            <div className="flex items-center gap-4 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
                                <img src={user.photoURL || "https://ui-avatars.com/api/?name="+user.displayName} alt="User" className="w-8 h-8 rounded-full" />
                                <span className="text-sm font-medium text-gray-700">{user.displayName || "Usuário Convidado"}</span>
                                <button onClick={onLogout} className="text-gray-400 hover:text-red-500 ml-2" title="Sair"><Icon name="logout" size={18} /></button>
                            </div>
                        </div>

                        {!showForm ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {projects.map(p => (
                                    <div key={p.id} onClick={() => onSelect(p)} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:border-blue-500 hover:shadow-md cursor-pointer transition-all flex flex-col text-left">
                                        <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center mb-4">
                                            <Icon name="building" size={24} />
                                        </div>
                                        <h3 className="font-bold text-lg text-gray-800">{p.nome}</h3>
                                        <p className="text-sm text-gray-500 mt-1 line-clamp-1">{p.endereco}</p>
                                        <span className="mt-4 inline-block bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded w-max">{p.tipo}</span>
                                    </div>
                                ))}
                                <div onClick={() => setShowForm(true)} className="bg-transparent border-2 border-dashed border-gray-300 p-6 rounded-xl hover:border-blue-500 hover:bg-blue-50 cursor-pointer transition-all flex flex-col items-center justify-center text-center min-h-[200px]">
                                    <Icon name="plus" size={32} className="text-gray-400 mb-2" />
                                    <h3 className="font-medium text-gray-600">Nova Obra</h3>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-200 max-w-lg mx-auto">
                                <h2 className="text-xl font-bold mb-6">Novo Empreendimento</h2>
                                <form onSubmit={(e) => { e.preventDefault(); onCreate({ nome, endereco, tipo }); setShowForm(false); }}>
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nome da Obra</label>
                                        <input required type="text" value={nome} onChange={e=>setNome(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
                                        <input required type="text" value={endereco} onChange={e=>setEndereco(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                                        <select value={tipo} onChange={e=>setTipo(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                            <option>Residencial Vertical</option>
                                            <option>Residencial Horizontal</option>
                                            <option>Comercial</option>
                                            <option>Infraestrutura</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 justify-end">
                                        <button type="button" onClick={() => setShowForm(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancelar</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Cadastrar</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const EAPSystemWorkspace = ({ user, company, project, onBack, onLogout }) => {
            const [eapData, setEapData] = useState(INITIAL_EAP_STRUCTURE);
            const [activeGroupId, setActiveGroupId] = useState(1);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            
            const [isServiceModalOpen, setServiceModalOpen] = useState(false);
            const [isCalcModalOpen, setCalcModalOpen] = useState(false);
            const [selectedCalcItem, setSelectedCalcItem] = useState(null);

            // Carregar Orçamento do Firestore
            useEffect(() => {
                if (!project || !user) return;
                setLoading(true);
                const docRef = db.doc(`${getUserPath(user.uid)}/orcamentos/${project.id}`);
                
                docRef.get().then(snap => {
                    if (snap.exists) {
                        setEapData(snap.data().eap);
                        if (snap.data().updatedAt) setLastSaved(snap.data().updatedAt.toDate());
                    } else {
                        setEapData(INITIAL_EAP_STRUCTURE);
                        setLastSaved(null);
                    }
                    setLoading(false);
                }).catch(err => {
                    console.error("Erro ao carregar orçamento", err);
                    setLoading(false);
                });
            }, [project, user]);

            const saveProject = async (data = eapData) => {
                setSaving(true);
                try {
                    const docRef = db.doc(`${getUserPath(user.uid)}/orcamentos/${project.id}`);
                    await docRef.set({
                        eap: data,
                        updatedAt: new Date(),
                        version: '1.0.0',
                        modifiedBy: user.uid
                    });
                    setLastSaved(new Date());
                } catch(e) {
                    console.error("Erro ao salvar no Firestore", e);
                    alert("Erro ao salvar alterações na nuvem.");
                }
                setSaving(false);
            };

            // Actions
            const handleAddService = (serviceFromCatalog) => {
                const newData = eapData.map(group => {
                    if (group.id === activeGroupId) {
                        return {
                            ...group,
                            items: [...group.items, { id: Date.now().toString(), code: serviceFromCatalog.code, description: serviceFromCatalog.name, unit: serviceFromCatalog.unit, quantity: 0, unitPrice: 0, memory: '', status: 'pending' }]
                        };
                    }
                    return group;
                });
                setEapData(newData);
                setServiceModalOpen(false);
            };

            const handleDeleteItem = (groupId, itemId) => {
                const newData = eapData.map(group => {
                    if (group.id === groupId) return { ...group, items: group.items.filter(i => i.id !== itemId) };
                    return group;
                });
                setEapData(newData);
            };

            const handleUpdateSubItem = (groupId, itemId, field, value) => {
                const newData = eapData.map(group => {
                    if (group.id === groupId) {
                        return { ...group, items: group.items.map(item => item.id === itemId ? { ...item, [field]: value } : item) };
                    }
                    return group;
                });
                setEapData(newData);
            };

            const handleSaveMemory = (itemId, text) => {
                handleUpdateSubItem(activeGroupId, itemId, 'memory', text);
                setCalcModalOpen(false);
                setSelectedCalcItem(null);
            };

            const handleExportJSON = () => {
                const dataStr = JSON.stringify(eapData, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `Orcamento_${project.nome}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
            };

            // Derived Data
            const activeGroup = useMemo(() => eapData.find(g => g.id === activeGroupId) || eapData[0], [eapData, activeGroupId]);
            const projectTotal = useMemo(() => eapData.reduce((acc, group) => acc + group.items.reduce((gAcc, item) => gAcc + (parseFloat(item.quantity||0) * parseFloat(item.unitPrice||0)), 0), 0), [eapData]);
            const groupTotal = useMemo(() => activeGroup.items.reduce((acc, item) => acc + (parseFloat(item.quantity||0) * parseFloat(item.unitPrice||0)), 0), [activeGroup]);

            if (loading) {
                return <div className="flex items-center justify-center h-screen bg-gray-100 text-gray-600"><Icon name="refreshcw" className="animate-spin mr-2" /> Carregando Orçamento...</div>;
            }

            return (
                <div className="flex h-screen bg-gray-100 overflow-hidden font-sans">
                    <ServiceSelectorModal isOpen={isServiceModalOpen} onClose={() => setServiceModalOpen(false)} services={getCatalogForGroup(activeGroupId)} onSelect={handleAddService} />
                    <CalculationFormModal isOpen={isCalcModalOpen} onClose={() => setCalcModalOpen(false)} item={selectedCalcItem} onSave={handleSaveMemory} />

                    {/* SIDEBAR */}
                    <div className={`${sidebarOpen ? 'w-80' : 'w-0'} bg-gray-900 text-white flex flex-col transition-all duration-300 shadow-xl overflow-hidden no-print`}>
                        <div className="p-4 bg-gray-800 border-b border-gray-700 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icon name="database" className="text-blue-400" />
                                <div>
                                    <h1 className="font-bold text-sm tracking-wide line-clamp-1">{company.nome}</h1>
                                    <span className="text-xs text-gray-400 line-clamp-1">{project.nome}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            <div className="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mt-2">Estrutura Analítica (EAP)</div>
                            {eapData.map(item => (
                                <SidebarItem key={item.id} item={item} isActive={activeGroupId === item.id} onClick={() => setActiveGroupId(item.id)} />
                            ))}
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* HEADER */}
                        <header className="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm no-print">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600"><Icon name="menu" size={20} /></button>
                                <button onClick={onBack} className="text-gray-400 hover:text-blue-600 px-2 flex items-center" title="Trocar de Obra"><Icon name="arrowleft" size={18} /></button>
                                <div className="border-l border-gray-300 pl-4">
                                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                        <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-sm font-mono">{activeGroup.code}</span>
                                        {activeGroup.name}
                                    </h2>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right mr-4 hidden md:block">
                                    <span className="block text-xs text-gray-500">Total Acumulado</span>
                                    <span className="block text-lg font-bold text-gray-900">{formatCurrency(projectTotal)}</span>
                                </div>
                                <button onClick={handleExportJSON} className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200"><Icon name="download" size={18} /></button>
                                <button onClick={() => window.print()} className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200"><Icon name="printer" size={18} /></button>
                                <button onClick={() => saveProject()} disabled={saving} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-white transition-colors ${saving ? 'bg-blue-400 cursor-wait' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                    {saving ? <Icon name="refreshcw" className="animate-spin" size={18} /> : <Icon name="save" size={18} />} {saving ? 'Salvando...' : 'Salvar Alterações'}
                                </button>
                                <div className="border-l border-gray-200 pl-4 ml-2 flex items-center gap-2">
                                    <img src={user.photoURL || "https://ui-avatars.com/api/?name="+user.displayName} className="w-8 h-8 rounded-full border border-gray-300" title={user.displayName || "Usuário"} />
                                    <button onClick={onLogout} className="text-gray-400 hover:text-red-500" title="Sair"><Icon name="logout" size={18} /></button>
                                </div>
                            </div>
                        </header>

                        {/* WORKSPACE */}
                        <main className="flex-1 overflow-y-auto p-6 bg-slate-50">
                            <div className="mb-6 flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-200 no-print">
                                <div><p className="text-sm text-gray-500">Subtotal do Grupo</p><p className="text-2xl font-bold text-gray-800">{formatCurrency(groupTotal)}</p></div>
                                <div><button onClick={() => setServiceModalOpen(true)} className="flex items-center gap-2 px-3 py-2 bg-green-600 text-white border border-green-600 rounded-lg hover:bg-green-700 shadow-sm text-sm font-medium"><Icon name="plus" size={18} /> Selecionar Serviço</button></div>
                            </div>

                            <div className="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-gray-50 text-gray-700 font-semibold border-b border-gray-200 uppercase text-xs">
                                            <tr>
                                                <th className="px-4 py-3 w-20">Código</th>
                                                <th className="px-4 py-3">Descrição do Serviço</th>
                                                <th className="px-4 py-3 w-24">Unidade</th>
                                                <th className="px-4 py-3 w-32">Qtd.</th>
                                                <th className="px-4 py-3 w-32">Custo Unit.</th>
                                                <th className="px-4 py-3 w-32">Total</th>
                                                <th className="px-4 py-3 w-28 text-center no-print">Fórmulas</th>
                                                <th className="px-4 py-3 w-24 text-center">Status</th>
                                                <th className="px-4 py-3 w-16 text-center no-print">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {activeGroup.items.length === 0 ? (
                                                <tr><td colSpan="9" className="px-4 py-12 text-center text-gray-400"><Icon name="filetext" className="mx-auto mb-2 opacity-50" size={32} />Nenhum serviço.<br/>Clique em "Selecionar Serviço".</td></tr>
                                            ) : (
                                                activeGroup.items.map(item => (
                                                    <React.Fragment key={item.id}>
                                                        <tr className="hover:bg-blue-50 transition-colors group">
                                                            <td className="px-4 py-3 font-mono text-gray-500">{item.code}</td>
                                                            <td className="px-4 py-3 font-medium text-gray-700">{item.description}</td>
                                                            <td className="px-4 py-3 text-gray-600">{item.unit}</td>
                                                            <td className="px-4 py-3"><input type="number" value={item.quantity} onChange={(e) => handleUpdateSubItem(activeGroupId, item.id, 'quantity', e.target.value)} className="w-full bg-white border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-blue-500 text-right font-bold text-gray-800" placeholder="0.00" /></td>
                                                            <td className="px-4 py-3"><input type="number" value={item.unitPrice} onChange={(e) => handleUpdateSubItem(activeGroupId, item.id, 'unitPrice', e.target.value)} className="w-full bg-transparent border-b border-gray-200 focus:border-blue-500 px-2 py-1 text-right text-gray-600" placeholder="0.00" /></td>
                                                            <td className="px-4 py-3 text-right font-bold text-gray-800">{formatCurrency(item.quantity * item.unitPrice)}</td>
                                                            <td className="px-4 py-3 text-center no-print"><button onClick={() => {setSelectedCalcItem(item); setCalcModalOpen(true);}} className={`flex items-center justify-center gap-1 w-full px-2 py-1.5 rounded border ${item.memory ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'}`}><Icon name="calculator" size={14} /><span className="text-xs font-semibold">{item.memory ? 'Editar' : 'Calcular'}</span></button></td>
                                                            <td className="px-4 py-3 text-center"><button onClick={() => handleUpdateSubItem(activeGroupId, item.id, 'status', item.status === 'approved' ? 'pending' : 'approved')} className={`flex items-center justify-center w-full gap-1 px-2 py-1 rounded text-xs font-bold uppercase ${item.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{item.status === 'approved' ? <Icon name="checkcircle" size={12}/> : <Icon name="lock" size={12}/>}{item.status === 'approved' ? 'OK' : 'Rev'}</button></td>
                                                            <td className="px-4 py-3 text-center no-print"><button onClick={() => handleDeleteItem(activeGroupId, item.id)} className="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50"><Icon name="trash2" size={16} /></button></td>
                                                        </tr>
                                                        {item.memory && (
                                                            <tr className="bg-gray-50/30 border-b border-gray-100"><td colSpan="2"></td><td colSpan="7" className="px-4 pb-2 pt-1"><div className="flex gap-2 items-start text-xs text-gray-400 italic"><Icon name="calculator" size={10} className="mt-0.5"/><span className="truncate max-w-md">{item.memory.slice(0, 100).replace(/\n/g, ' ')}...</span></div></td></tr>
                                                        )}
                                                    </React.Fragment>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="bg-gray-50 px-6 py-3 border-t border-gray-200 flex justify-between items-center text-xs text-gray-500 no-print">
                                    <span>{activeGroup.items.length} serviços selecionados</span>
                                    {lastSaved && <span className="flex items-center gap-1"><Icon name="checkcircle" size={12} className="text-green-500" /> Salvo: {lastSaved.toLocaleTimeString()}</span>}
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        // --- ROOT APPLICATION CONTROLLER ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [projects, setProjects] = useState([]);
            const [selectedProject, setSelectedProject] = useState(null);

            // Auth Listener
            useEffect(() => {
                const initAuth = async () => {
                    // Verifica se é o projeto padrão ou o projeto customizado do usuário
                    const isCustomProject = firebaseConfig.projectId === "eap-sistema-obras";
                    
                    // Apenas usa o token do ambiente se NÃO estivermos no projeto customizado
                    // Se estiver no projeto customizado, o token gerado para o Canvas dará erro "custom-token-mismatch"
                    if (!isCustomProject && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } catch(e) { console.warn("Erro no Token:", e.message); }
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            // Companies Listener
            useEffect(() => {
                if (!user) { setCompanies([]); setSelectedCompany(null); return; }
                const unsubscribe = db.collection(`${getUserPath(user.uid)}/empresas`)
                    .onSnapshot(snap => {
                        const emps = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setCompanies(emps);
                    }, err => console.error("Erro Empresas:", err));
                return () => unsubscribe();
            }, [user]);

            // Projects Listener
            useEffect(() => {
                if (!user || !selectedCompany) { setProjects([]); setSelectedProject(null); return; }
                const unsubscribe = db.collection(`${getUserPath(user.uid)}/obras`)
                    .onSnapshot(snap => {
                        const obs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                                           .filter(o => o.empresaId === selectedCompany.id);
                        setProjects(obs);
                    }, err => console.error("Erro Obras:", err));
                return () => unsubscribe();
            }, [user, selectedCompany]);

            // Handlers
            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.warn("Popup bloqueado/não suportado. Utilizando autenticação anônima.", error);
                    await auth.signInAnonymously();
                }
            };

            const handleLogout = () => {
                auth.signOut();
                setSelectedCompany(null);
                setSelectedProject(null);
            };

            const handleCreateCompany = async (comp) => {
                try {
                    await db.collection(`${getUserPath(user.uid)}/empresas`).add({ ...comp, createdAt: new Date() });
                } catch(e) { alert("Erro ao criar empresa."); console.error(e); }
            };

            const handleCreateProject = async (proj) => {
                try {
                    await db.collection(`${getUserPath(user.uid)}/obras`).add({ ...proj, empresaId: selectedCompany.id, createdAt: new Date() });
                } catch(e) { alert("Erro ao criar obra."); console.error(e); }
            };

            if (loadingAuth) return <div className="flex items-center justify-center h-screen"><Icon name="refreshcw" className="animate-spin text-blue-600" size={32} /></div>;
            if (!user) return <LoginScreen onLogin={handleLogin} />;
            if (!selectedCompany) return <CompanyScreen companies={companies} onSelect={setSelectedCompany} onCreate={handleCreateCompany} user={user} onLogout={handleLogout} />;
            if (!selectedProject) return <ProjectScreen projects={projects} company={selectedCompany} onSelect={setSelectedProject} onCreate={handleCreateProject} onBack={() => setSelectedCompany(null)} user={user} onLogout={handleLogout} />;
            
            return <EAPSystemWorkspace user={user} company={selectedCompany} project={selectedProject} onBack={() => setSelectedProject(null)} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
