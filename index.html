        // --- GANTT ENGINE CORE ---
        const GanttEngine = ({ projectConfig, holidays, packages, phases, updatePackage }) => {
            const [localPackages, setLocalPackages] = useState(packages);
            
            useEffect(() => setLocalPackages(packages), [packages]);

            // Configurações
            const startDate = projectConfig?.startDate || "2025-11-03"; // Start on a Monday
            const showWeekends = projectConfig?.showWeekends || false;
            const TOTAL_DAYS_TO_GENERATE = 180; // Gera ~6 meses de calendário

            // Gera Calendário
            const timeline = useMemo(() => {
                const days = [];
                let currDate = new Date(startDate + "T00:00:00");
                const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                const dayInitials = ["D", "S", "T", "Q", "Q", "S", "S"];
                
                for(let i=0; i<TOTAL_DAYS_TO_GENERATE; i++) {
                    const dStr = currDate.toISOString().split('T')[0];
                    const dayOfWeek = currDate.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    const isHoliday = holidays.some(h => h.date === dStr);
                    const isWorkingDay = !isHoliday && !isWeekend;
                    
                    const monthYear = `${monthNames[currDate.getMonth()]}-${currDate.getFullYear().toString().slice(-2)}`;

                    days.push({
                        dateObj: new Date(currDate),
                        dStr,
                        dayOfWeek,
                        initial: dayInitials[dayOfWeek],
                        dayNum: currDate.getDate(),
                        isWeekend,
                        isHoliday,
                        isWorkingDay,
                        monthYear
                    });
                    currDate.setDate(currDate.getDate() + 1);
                }

                // Filtra para visualização (esconde fds se configurado)
                const visible = days.filter(d => showWeekends ? true : !d.isWeekend);
                
                // Agrupa Meses para a Linha 1
                const months = [];
                let currentMonth = null;
                visible.forEach(day => {
                    if (!currentMonth || currentMonth.name !== day.monthYear) {
                        if (currentMonth) months.push(currentMonth);
                        currentMonth = { name: day.monthYear, colSpan: 1 };
                    } else {
                        currentMonth.colSpan++;
                    }
                });
                if (currentMonth) months.push(currentMonth);

                return { allDays: days, visibleDays: visible, monthsGrouped: months };
            }, [startDate, showWeekends, holidays]);

            // Calcula Início e Fim das Tarefas
            const tasksCalculated = useMemo(() => {
                return localPackages.map(pkg => {
                    let startIdx = pkg.startWorkingDay || 0; // Índice de dias ÚTEIS desde o início
                    let dur = pkg.durationWorkingDays || 5;

                    // Encontra a data real de início pulando feriados/fds até o startIdx útil
                    let actualStartDate = null;
                    let actualEndDate = null;
                    let wDaysCount = 0;
                    
                    for (let i = 0; i < timeline.allDays.length; i++) {
                        const day = timeline.allDays[i];
                        if (day.isWorkingDay) {
                            if (wDaysCount === startIdx) actualStartDate = day.dateObj;
                            if (wDaysCount === startIdx + dur - 1) {
                                actualEndDate = day.dateObj;
                                break;
                            }
                            wDaysCount++;
                        }
                    }

                    // Se estourar o calendário gerado
                    if(!actualStartDate) actualStartDate = timeline.allDays[timeline.allDays.length-1].dateObj;
                    if(!actualEndDate) actualEndDate = timeline.allDays[timeline.allDays.length-1].dateObj;

                    // Para desenhar no gráfico visível, precisamos achar os índices no array 'visibleDays'
                    const vStartIdx = timeline.visibleDays.findIndex(d => d.dStr === actualStartDate.toISOString().split('T')[0]);
                    const vEndIdx = timeline.visibleDays.findIndex(d => d.dStr === actualEndDate.toISOString().split('T')[0]);

                    const phase = phases.find(p => p.id === pkg.phaseId);

                    return {
                        ...pkg,
                        color: pkg.color || phase?.color || '#3b82f6',
                        vStartIdx: vStartIdx !== -1 ? vStartIdx : 0,
                        vEndIdx: vEndIdx !== -1 ? vEndIdx : 0,
                        phaseName: phase?.name || 'Sem Fase'
                    };
                });
            }, [localPackages, timeline, phases]);

            // Agrupa Tarefas por Fase para a Tabela
            const groupedTasks = phases.map(p => ({
                ...p,
                tasks: tasksCalculated.filter(t => t.phaseId === p.id)
            })).filter(p => p.tasks.length > 0);

            const CELL_WIDTH = 22; // px per day

            return (
                <div className="flex flex-1 overflow-hidden bg-white">
                    {/* LEFT PANEL: TABLE */}
                    <div className="w-[350px] border-r border-gray-300 flex flex-col z-10 shadow-[2px_0_5px_rgba(0,0,0,0.05)] bg-white">
                        <div className="h-[72px] bg-slate-100 border-b border-gray-300 flex items-center px-4 font-bold text-xs text-slate-600 uppercase">
                            <div className="flex-1">Pacotes de Trabalho</div>
                            <div className="w-16 text-center">Início (DU)</div>
                            <div className="w-16 text-center">Dur (DU)</div>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar pb-20">
                            {groupedTasks.map(group => (
                                <div key={group.id}>
                                    <div className="bg-slate-200 px-2 py-1 text-xs font-bold text-slate-700 uppercase" style={{borderLeft: `4px solid ${group.color}`}}>
                                        {group.name}
                                    </div>
                                    {group.tasks.map(task => (
                                        <div key={task.id} className="h-8 border-b border-gray-100 flex items-center px-2 text-xs hover:bg-slate-50">
                                            <div className="flex-1 truncate pr-2 flex items-center gap-1.5" title={task.name}>
                                                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor: task.color}}></div>
                                                <span className="text-slate-700 truncate">{task.name}</span>
                                            </div>
                                            <div className="w-16 px-1">
                                                <input type="number" min="0" value={task.startWorkingDay} onChange={e=>updatePackage(task.id, 'startWorkingDay', parseInt(e.target.value)||0)} className="w-full text-center border border-gray-300 rounded py-0.5 focus:ring-1 focus:ring-blue-500 text-blue-700 font-bold bg-white" />
                                            </div>
                                            <div className="w-16 px-1">
                                                <input type="number" min="1" value={task.durationWorkingDays} onChange={e=>updatePackage(task.id, 'durationWorkingDays', parseInt(e.target.value)||1)} className="w-full text-center border border-gray-300 rounded py-0.5 focus:ring-1 focus:ring-blue-500 font-medium text-slate-600 bg-white" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* RIGHT PANEL: GANTT CHART */}
                    <div className="flex-1 overflow-auto bg-white relative custom-scrollbar">
                        <div style={{ width: `${timeline.visibleDays.length * CELL_WIDTH}px` }}>
                            
                            {/* HEADER 3 ROWS */}
                            <div className="sticky top-0 z-20 bg-white border-b-2 border-gray-400">
                                {/* Row 1: Months */}
                                <div className="flex h-6 bg-slate-100 text-[10px] font-bold text-slate-600 uppercase text-center border-b border-gray-300">
                                    {timeline.monthsGrouped.map((m, i) => (
                                        <div key={i} className="flex items-center justify-center border-r-2 border-slate-400" style={{width: `${m.colSpan * CELL_WIDTH}px`}}>
                                            {m.name}
                                        </div>
                                    ))}
                                </div>
                                {/* Row 2: Weekday Initials */}
                                <div className="flex h-5 bg-slate-50 text-[9px] font-bold text-center border-b border-gray-200">
                                    {timeline.visibleDays.map((d, i) => {
                                        let bg = "bg-white", text = "text-slate-500";
                                        if (d.isHoliday) { bg = "bg-slate-800"; text = "text-white"; }
                                        else if (d.dayOfWeek === 1) { bg = "bg-red-50"; text = "text-red-600"; } // Segunda
                                        else if (d.isWeekend) { bg = "bg-slate-200"; text = "text-slate-600"; }
                                        return (
                                            <div key={i} className={`flex items-center justify-center border-r border-gray-200 ${bg} ${text}`} style={{width: `${CELL_WIDTH}px`}}>
                                                {d.initial}
                                            </div>
                                        );
                                    })}
                                </div>
                                {/* Row 3: Numeric Dates rotated */}
                                <div className="flex h-7 bg-white text-[10px] font-medium text-center border-b border-gray-300">
                                    {timeline.visibleDays.map((d, i) => {
                                        let bg = "bg-white", text = "text-slate-700";
                                        if (d.isHoliday) { bg = "bg-slate-800"; text = "text-white"; }
                                        else if (d.isWeekend) { bg = "bg-slate-200"; text = "text-slate-600"; }
                                        return (
                                            <div key={i} className={`flex items-center justify-center border-r border-gray-200 ${bg} ${text}`} style={{width: `${CELL_WIDTH}px`}}>
                                                <span className="rotate-90-text">{d.dayNum.toString().padStart(2,'0')}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* GRID BODY */}
                            <div className="relative pb-20">
                                {/* Background columns */}
                                <div className="absolute inset-0 flex pointer-events-none z-0">
                                    {timeline.visibleDays.map((d, i) => (
                                        <div key={i} className={`border-r border-gray-100 ${d.isWeekend ? 'bg-slate-50' : ''} ${d.isHoliday ? 'bg-slate-100' : ''}`} style={{width: `${CELL_WIDTH}px`}}></div>
                                    ))}
                                </div>
                                
                                {/* Bars */}
                                <div className="relative z-10">
                                    {groupedTasks.map(group => (
                                        <div key={group.id}>
                                            <div className="h-6"></div> {/* Group spacing */}
                                            {group.tasks.map(task => {
                                                const left = task.vStartIdx * CELL_WIDTH;
                                                const width = (task.vEndIdx - task.vStartIdx + 1) * CELL_WIDTH;
                                                return (
                                                    <div key={task.id} className="h-8 relative group border-b border-transparent">
                                                        <div 
                                                            className="absolute h-5 top-1.5 rounded-sm shadow-sm flex items-center px-1.5 text-[9px] font-bold text-white overflow-hidden transition-all gantt-bg cursor-pointer hover:brightness-110"
                                                            style={{ left: `${left}px`, width: `${width}px`, backgroundColor: task.color }}
                                                            title={`${task.name}\nInício: ${timeline.visibleDays[task.vStartIdx]?.dStr}\nFim: ${timeline.visibleDays[task.vEndIdx]?.dStr}`}
                                                        >
                                                            <span className="truncate drop-shadow-md">{task.name}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PacotesScreen = ({ packages, phases, eapData, addPackage, deletePackage }) => {
            const [name, setName] = useState('');
            const [color, setColor] = useState('#3b82f6');
            const [phaseId, setPhaseId] = useState(phases[0]?.id || '');
            const [dur, setDur] = useState(5);

            return (
                <div className="p-6 h-full overflow-auto bg-slate-50">
                    <div className="max-w-5xl mx-auto">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="layers" className="text-blue-600"/> Cadastrar Pacote de Trabalho</h2>
                            <div className="grid grid-cols-4 gap-4 items-end">
                                <div className="col-span-2">
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Nome do Pacote</label>
                                    <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none" placeholder="Ex: Embutidos Térreo"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Fase da Obra</label>
                                    <select value={phaseId} onChange={e=>setPhaseId(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none">
                                        {phases.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Duração Est. (Dias)</label>
                                    <input type="number" value={dur} onChange={e=>setDur(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Cor</label>
                                    <input type="color" value={color} onChange={e=>setColor(e.target.value)} className="w-full h-10 border rounded cursor-pointer p-1"/>
                                </div>
                                <div className="col-span-3 flex justify-end">
                                    <button onClick={() => { if(name){ addPackage({ name, color, phaseId, durationWorkingDays: parseInt(dur), startWorkingDay: 0 }); setName(''); } }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Adicionar Pacote</button>
                                </div>
                            </div>
                        </div>

                        <h3 className="font-bold text-gray-700 mb-3">Pacotes Cadastrados</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {packages.map(pkg => (
                                <div key={pkg.id} className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 border-l-4" style={{borderLeftColor: pkg.color}}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-bold text-slate-800">{pkg.name}</h4>
                                            <p className="text-xs text-slate-500 mt-1">Duração: {pkg.durationWorkingDays} dias úteis</p>
                                        </div>
                                        <button onClick={()=>deletePackage(pkg.id)} className="text-gray-400 hover:text-red-500"><Icon name="trash2" size={16}/></button>
                                    </div>
                                    <div className="mt-4 pt-3 border-t border-gray-100">
                                        <button className="text-xs text-blue-600 font-semibold flex items-center gap-1 hover:underline"><Icon name="plus" size={12}/> Vincular Itens EAP (Rateio)</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const FasesScreen = ({ phases, addPhase, deletePhase }) => {
            const [name, setName] = useState('');
            const [color, setColor] = useState('#64748b');
            return (
                <div className="p-6 max-w-3xl mx-auto h-full overflow-auto bg-slate-50">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="flag" className="text-blue-600"/> Fases da Obra</h2>
                        <div className="flex gap-4 items-end">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">Nome da Fase</label>
                                <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none"/>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Cor Padrão</label>
                                <input type="color" value={color} onChange={e=>setColor(e.target.value)} className="w-16 h-10 border rounded cursor-pointer p-1"/>
                            </div>
                            <button onClick={() => { if(name) { addPhase({name, color}); setName('');} }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Adicionar</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 text-slate-600 font-bold uppercase text-xs border-b border-gray-200">
                                <tr>
                                    <th className="px-4 py-3 w-16">Ordem</th>
                                    <th className="px-4 py-3 w-16">Cor</th>
                                    <th className="px-4 py-3">Nome da Fase</th>
                                    <th className="px-4 py-3 w-16 text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {phases.map((p, idx) => (
                                    <tr key={p.id} className="hover:bg-slate-50">
                                        <td className="px-4 py-3 text-slate-500 font-mono">{idx + 1}</td>
                                        <td className="px-4 py-3"><div className="w-6 h-6 rounded-full border border-gray-300 shadow-sm" style={{backgroundColor: p.color}}></div></td>
                                        <td className="px-4 py-3 font-medium text-slate-700">{p.name}</td>
                                        <td className="px-4 py-3 text-center"><button onClick={()=>deletePhase(p.id)} className="text-slate-400 hover:text-red-500"><Icon name="trash2" size={16}/></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ConfigScreen = ({ config, holidays, setConfig, addHoliday, deleteHoliday }) => {
            const [hDate, setHDate] = useState('');
            const [hName, setHName] = useState('');
            return (
                <div className="p-6 max-w-3xl mx-auto h-full overflow-auto bg-slate-50">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="settings" className="text-blue-600"/> Configurações do Cronograma</h2>
                        <div className="flex items-center gap-4 p-4 bg-slate-50 border border-gray-200 rounded-lg">
                            <label className="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked={config.showWeekends} onChange={e => setConfig({...config, showWeekends: e.target.checked})} className="sr-only peer" />
                                <div className="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                <span className="ml-3 text-sm font-medium text-gray-700">Incluir fins de semana no gráfico (Exibe Sáb e Dom em cinza)</span>
                            </label>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="calendar" className="text-blue-600"/> Banco de Feriados</h2>
                        <div className="flex gap-4 items-end mb-6 bg-slate-50 p-4 rounded-lg border border-gray-200">
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Data</label>
                                <input type="date" value={hDate} onChange={e=>setHDate(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none"/>
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">Descrição do Feriado</label>
                                <input type="text" value={hName} onChange={e=>setHName(e.target.value)} placeholder="Ex: Aniversário da Cidade" className="w-full p-2 border rounded focus:ring-2 outline-none"/>
                            </div>
                            <button onClick={() => { if(hDate && hName) { addHoliday({date: hDate, name: hName}); setHDate(''); setHName('');} }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Adicionar</button>
                        </div>

                        <div className="overflow-hidden border border-gray-200 rounded-lg">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 text-slate-600 font-bold uppercase text-xs border-b border-gray-200">
                                    <tr>
                                        <th className="px-4 py-3 w-32">Data</th>
                                        <th className="px-4 py-3">Feriado</th>
                                        <th className="px-4 py-3 w-16 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {holidays.sort((a,b)=>new Date(a.date)-new Date(b.date)).map((h, idx) => (
                                        <tr key={idx} className="hover:bg-slate-50">
                                            <td className="px-4 py-2 font-mono text-slate-600">{h.date.split('-').reverse().join('/')}</td>
                                            <td className="px-4 py-2 font-medium text-slate-700">{h.name}</td>
                                            <td className="px-4 py-2 text-center"><button onClick={()=>deleteHoliday(idx)} className="text-slate-400 hover:text-red-500"><Icon name="trash2" size={16}/></button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const CronogramaContainer = ({ user, project, saveToCloud }) => {
            const [activeTab, setActiveTab] = useState('gantt'); // gantt, pacotes, fases, config
            
            // Estado do Cronograma (Idealmente viria do Firestore)
            const [config, setConfig] = useState({ startDate: '2025-11-03', showWeekends: false });
            const [holidays, setHolidays] = useState(DEFAULT_HOLIDAYS);
            const [phases, setPhases] = useState(DEFAULT_PHASES);
            const [packages, setPackages] = useState([
                { id: 'p1', name: 'Escavações e Fundações', phaseId: 'f3', durationWorkingDays: 15, startWorkingDay: 0 },
                { id: 'p2', name: 'Concretagem Lajes e Pilares', phaseId: 'f4', durationWorkingDays: 20, startWorkingDay: 15 },
                { id: 'p3', name: 'Alvenaria de Vedação', phaseId: 'f5', durationWorkingDays: 25, startWorkingDay: 35 },
                { id: 'p4', name: 'Embutidos (Elétrica/Hidráulica)', phaseId: 'f5', durationWorkingDays: 15, startWorkingDay: 40 },
                { id: 'p5', name: 'Reboco Interno', phaseId: 'f6', durationWorkingDays: 18, startWorkingDay: 50 },
            ]);

            const updatePackage = (id, field, val) => setPackages(prev => prev.map(p => p.id === id ? {...p, [field]: val} : p));
            const addPackage = (p) => setPackages(prev => [...prev, { ...p, id: Date.now().toString() }]);
            const deletePackage = (id) => setPackages(prev => prev.filter(p => p.id !== id));
            
            const addPhase = (p) => setPhases(prev => [...prev, { ...p, id: Date.now().toString(), seq: prev.length+1 }]);
            const deletePhase = (id) => setPhases(prev => prev.filter(p => p.id !== id));

            const addHoliday = (h) => setHolidays(prev => [...prev, h]);
            const deleteHoliday = (idx) => setHolidays(prev => prev.filter((_, i) => i !== idx));

            return (
                <div className="flex flex-col h-full bg-slate-50 overflow-hidden">
                    <div className="flex gap-1 p-2 bg-slate-200 border-b border-gray-300 no-print text-sm">
                        <button onClick={()=>setActiveTab('gantt')} className={`px-4 py-1.5 rounded-md font-bold transition-all flex items-center gap-2 ${activeTab==='gantt'?'bg-white shadow text-blue-600':'text-gray-600 hover:bg-gray-300'}`}><Icon name="barchart" size={16}/> Gráfico Gantt</button>
                        <button onClick={()=>setActiveTab('pacotes')} className={`px-4 py-1.5 rounded-md font-bold transition-all flex items-center gap-2 ${activeTab==='pacotes'?'bg-white shadow text-blue-600':'text-gray-600 hover:bg-gray-300'}`}><Icon name="layers" size={16}/> Pacotes de Trabalho</button>
                        <button onClick={()=>setActiveTab('fases')} className={`px-4 py-1.5 rounded-md font-bold transition-all flex items-center gap-2 ${activeTab==='fases'?'bg-white shadow text-blue-600':'text-gray-600 hover:bg-gray-300'}`}><Icon name="flag" size={16}/> Fases</button>
                        <button onClick={()=>setActiveTab('config')} className={`px-4 py-1.5 rounded-md font-bold transition-all flex items-center gap-2 ${activeTab==='config'?'bg-white shadow text-blue-600':'text-gray-600 hover:bg-gray-300'}`}><Icon name="calendar" size={16}/> Feriados / Config</button>
                    </div>

                    <div className="flex-1 overflow-hidden">
                        {activeTab === 'gantt' && <GanttEngine projectConfig={config} holidays={holidays} packages={packages} phases={phases} updatePackage={updatePackage} />}
                        {activeTab === 'pacotes' && <PacotesScreen packages={packages} phases={phases} eapData={[]} addPackage={addPackage} deletePackage={deletePackage} />}
                        {activeTab === 'fases' && <FasesScreen phases={phases} addPhase={addPhase} deletePhase={deletePhase} />}
                        {activeTab === 'config' && <ConfigScreen config={config} setConfig={setConfig} holidays={holidays} addHoliday={addHoliday} deleteHoliday={deleteHoliday} />}
                    </div>
                </div>
            );
        };


        // --- MAIN WORKSPACE INTEGRATION ---
        const MainWorkspace = ({ user, company, project, onGoToObras, onLogout }) => {
            const [activeModule, setActiveModule] = useState('cronograma'); // Start on cronograma for demo
            
            // For simplicity in this demo, EAP data logic is kept minimal to focus on the new Cronograma module
            const [eapData, setEapData] = useState(INITIAL_EAP_STRUCTURE);

            return (
                <div className="flex flex-col h-screen bg-gray-100 font-sans overflow-hidden">
                    <TopNavBar user={user} company={company} project={project} activeModule={activeModule} setActiveModule={setActiveModule} onGoToObras={onGoToObras} onLogout={onLogout} />

                    {activeModule === 'orcamento' && (
                        <div className="flex-1 flex items-center justify-center bg-slate-100 text-slate-500">
                            Módulo de Orçamento (Mantido intacto na base de código)
                        </div>
                    )}

                    {activeModule === 'cronograma' && (
                        <CronogramaContainer user={user} project={project} saveToCloud={()=>{}} />
                    )}

                    {activeModule === 'relatorios' && (
                        <div className="flex-1 flex items-center justify-center bg-slate-100 text-slate-500">Módulo de Relatórios</div>
                    )}
                </div>
            );
        };

        // --- ROOT / ENTRY POINT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [selectedProject, setSelectedProject] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    if(!u) auth.signInAnonymously(); // Auto-login
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const mockEmpresa = { id: 'emp1', nome: 'AC Incorporações', cnpj: '00.000.000/0001-00' };
                const mockObra = { id: 'ob1', nome: 'Edifício Residencial RF 2025', empresaId: 'emp1' };
                setSelectedCompany(mockEmpresa); 
                setSelectedProject(mockObra);
            }, [user]);

            if (!user || !selectedProject) return <div className="flex justify-center items-center h-screen"><Icon name="refreshcw" className="animate-spin text-blue-500" size={32}/></div>;
            return <MainWorkspace user={user} company={selectedCompany} project={selectedProject} onGoToObras={() => setSelectedProject(null)} onLogout={() => auth.signOut()} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
